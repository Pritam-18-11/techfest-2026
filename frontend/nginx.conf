server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Long-lived caching for hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: let React Router handle all non-file routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt { access_log off; }
    location = /sitemap.xml { access_log off; }
}